<div style="padding: 30px; font-family: 'Segoe UI', system-ui, sans-serif;">
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h1 style="color: #2c3e50;">Painel de Controle de Ativos</h1>
    <button (click)="carregarDados()" 
            style="background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">
      🔄 Sincronizar Agora
    </button>
  </div>

  <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

  <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
    
    @for (ativo of listaAtivos(); track ativo.id) {
      <div style="background: white; border: 1px solid #e0e0e0; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
          <h2 style="margin: 0; font-size: 1.2rem; color: #34495e;">{{ ativo.nome_ativo }}</h2>
          <span [style.background]="ativo.status === 'Online' ? '#d4edda' : '#f8d7da'"
                [style.color]="ativo.status === 'Online' ? '#155724' : '#721c24'"
                style="padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold;">
            {{ ativo.status }}
          </span>
        </div>

        <div style="margin: 20px 0;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9rem;">
            <span>Carga da CPU</span>
            <strong>{{ ativo.carga_cpu }}%</strong>
          </div>
          <div style="background: #f0f0f0; border-radius: 10px; height: 8px; overflow: hidden;">
            <div [style.width.%]="ativo.carga_cpu"
                 [style.background]="ativo.carga_cpu > 80 ? '#e74c3c' : '#2ecc71'"
                 style="height: 100%; transition: width 0.3s ease-in-out;">
            </div>
          </div>
        </div>

        <div style="color: #95a5a6; font-size: 0.8rem; border-top: 1px solid #f9f9f9; padding-top: 10px;">
          Última atualização: {{ ativo.ultima_atualizacao | date:'dd/MM/yyyy HH:mm:ss' }}
        </div>
      </div>
    } @empty {
      <p>Nenhum dado recebido do Python ainda...</p>
    }

  </div>
</div>
